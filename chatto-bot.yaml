# Chatto Bot configuration
# Secrets (token, email, password, session) should stay in .env or environment variables.

instance: https://chat.chatto.run
prefix: "!"
dms: true

# rooms: optional allowlist of room IDs. Omit to handle every joined room.
# rooms:
#   - <room-id>

admins:
  - teal
  - hmans

extensions:
  - plugins.admin
  - plugins.remind
